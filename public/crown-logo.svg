<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Crown base -->
  <path d="M8 48 L10 28 L16 35 L22 22 L32 32 L42 22 L48 35 L54 28 L56 48 Z"
        fill="url(#goldGradient)"
        stroke="#D4AF37"
        stroke-width="2"/>

  <!-- Crown rim -->
  <rect x="6" y="46" width="52" height="8" rx="2"
        fill="url(#darkGold)"
        stroke="#D4AF37"
        stroke-width="1.5"/>

  <!-- Jewels on crown points -->
  <circle cx="16" cy="35" r="3" fill="#FF6B6B" stroke="#C92A2A" stroke-width="1"/>
  <circle cx="32" cy="32" r="3.5" fill="#4ECDC4" stroke="#0C7B73" stroke-width="1"/>
  <circle cx="48" cy="35" r="3" fill="#FF6B6B" stroke="#C92A2A" stroke-width="1"/>

  <!-- Center jewel (larger) -->
  <circle cx="32" cy="25" r="4" fill="#FFD700" stroke="#FFA500" stroke-width="1.5">
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Side decorative jewels -->
  <circle cx="22" cy="38" r="2" fill="#4ECDC4" stroke="#0C7B73" stroke-width="0.5"/>
  <circle cx="42" cy="38" r="2" fill="#4ECDC4" stroke="#0C7B73" stroke-width="0.5"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FDB913;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDB913;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
