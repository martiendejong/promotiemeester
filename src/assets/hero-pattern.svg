<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Subtle geometric background pattern -->
  <defs>
    <pattern id="grid" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="1.5" fill="#FFD700" opacity="0.1"/>
      <circle cx="0" cy="0" r="1" fill="#FDB913" opacity="0.08"/>
      <circle cx="100" cy="0" r="1" fill="#FDB913" opacity="0.08"/>
      <circle cx="0" cy="100" r="1" fill="#FDB913" opacity="0.08"/>
      <circle cx="100" cy="100" r="1" fill="#FDB913" opacity="0.08"/>
    </pattern>

    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFBF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF8E7;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Base gradient background -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>

  <!-- Pattern overlay -->
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Glowing orbs -->
  <circle cx="400" cy="200" r="300" fill="url(#glow)"/>
  <circle cx="1520" cy="800" r="250" fill="url(#glow)"/>

  <!-- Decorative crown shapes (very subtle) -->
  <path d="M100 100 L110 80 L120 100 L130 75 L140 100 L150 80 L160 100 L150 120 L100 120 Z"
        fill="#FFD700" opacity="0.05"/>
  <path d="M1700 900 L1710 880 L1720 900 L1730 875 L1740 900 L1750 880 L1760 900 L1750 920 L1700 920 Z"
        fill="#FFD700" opacity="0.05"/>
</svg>
